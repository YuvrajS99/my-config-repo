# ==========================================
# DEFAULT CONFIGURATION
# ==========================================
server.port=8081

# ==========================================
# DEFAULT JWT CONFIGURATION
# ==========================================
jwt.secret=YourSecretKeyYourSecretKeyYourSecretKeyYourSecretKeyYourSecretKey
jwt.expiration=86400000

# ==========================================
# DEFAULT DB / JPA CONFIGURATION
# ==========================================
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.open-in-view=false

# ==========================================
# DEFAULT MAIL CONFIGURATION
# ==========================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

#---
spring.config.activate.on-profile=dev

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5434/bankdb
spring.datasource.username=postgres
spring.datasource.password=1234

# JPA & Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Consul Configuration
spring.cloud.consul.host=localhost
spring.cloud.consul.port=8500
spring.cloud.consul.discovery.enabled=true
spring.cloud.consul.discovery.register=true
spring.cloud.consul.discovery.deregister=true
spring.cloud.consul.discovery.prefer-ip-address=true
spring.cloud.consul.discovery.instance-id=${spring.application.name}:${server.port}

# ACTUATOR CONFIGURATION
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.health.defaults.enabled=true

# CONSUL HEALTH CHECK
spring.cloud.consul.discovery.health-check-path=/actuator/health
spring.cloud.consul.discovery.health-check-interval=10s
spring.cloud.consul.discovery.health-check-timeout=10s
spring.cloud.consul.discovery.metadata.service-name=auth-service

# Logging
logging.level.root=INFO
logging.level.com.yuvraj.authservice=DEBUG

# Redis Configuration
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Google OAuth2 Configuration
spring.security.oauth2.client.registration.google.client-id=YOUR_GOOGLE_CLIENT_ID
spring.security.oauth2.client.registration.google.client-secret=YOUR_GOOGLE_CLIENT_SECRET
spring.security.oauth2.client.registration.google.scope=profile,email

# Mail Configuration
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password

#---
spring.config.activate.on-profile=test

# Database Configuration (Test DB)
spring.datasource.url=jdbc:postgresql://localhost:5434/authdb_test
spring.datasource.username=postgres
spring.datasource.password=1234

# JPA & Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Disable Consul Discovery for tests
spring.cloud.consul.enabled=false
spring.cloud.consul.discovery.enabled=false

# Logging Reduced
logging.level.root=WARN

# Google OAuth2 Configuration (Test)
spring.security.oauth2.client.registration.google.client-id=TEST_GOOGLE_CLIENT_ID
spring.security.oauth2.client.registration.google.client-secret=TEST_GOOGLE_CLIENT_SECRET
spring.security.oauth2.client.registration.google.scope=profile,email

# Mail Configuration (Test)
spring.mail.username=test-email@gmail.com
spring.mail.password=test-app-password

#---
spring.config.activate.on-profile=prod

# Database Configuration (Production - Environment Variables)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# JPA & Hibernate Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Consul Configuration
spring.cloud.consul.host=${CONSUL_HOST:localhost}
spring.cloud.consul.port=${CONSUL_PORT:8500}
spring.cloud.consul.discovery.enabled=true
spring.cloud.consul.discovery.register=true
spring.cloud.consul.discovery.deregister=true
spring.cloud.consul.discovery.prefer-ip-address=true
spring.cloud.consul.discovery.instance-id=${spring.application.name}:${server.port}

# ACTUATOR CONFIGURATION
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=never

# Logging
logging.level.root=ERROR

# JWT Configuration
jwt.secret=${JWT_SECRET}

# Google OAuth2 Configuration
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email

# Mail Configuration
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
