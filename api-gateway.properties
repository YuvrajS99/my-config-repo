# ==========================================
# SERVER CONFIGURATION
# ==========================================
server.port=9090
spring.application.name=api-gateway
message=API Gateway Config Loaded

# ==========================================
# CONSUL CONFIGURATION
# ==========================================
spring.cloud.consul.host=localhost
spring.cloud.consul.port=8500
spring.cloud.consul.discovery.enabled=true
spring.cloud.consul.discovery.register=true
spring.cloud.consul.discovery.deregister=true
spring.cloud.consul.discovery.prefer-ip-address=true
spring.cloud.consul.discovery.instance-id=${spring.application.name}:${server.port}

# ==========================================
# CONSUL HEALTH CHECK
# ==========================================
spring.cloud.consul.discovery.health-check-path=/actuator/health
spring.cloud.consul.discovery.health-check-interval=10s
spring.cloud.consul.discovery.health-check-timeout=10s
spring.cloud.consul.discovery.metadata.service-name=api-gateway


# ==========================================
# ACTUATOR CONFIGURATION
# ==========================================
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.health.defaults.enabled=true

# ==========================================
# JWT CONFIGURATION
# ==========================================
jwt.secret=YourSecretKeyYourSecretKeyYourSecretKeyYourSecretKeyYourSecretKey

# ==========================================
# SPRING CLOUD GATEWAY
# ==========================================
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# ==========================================
# CORS CONFIGURATION
# ==========================================
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-origin-patterns=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-headers=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allow-credentials=true

# ==========================================
# AUTH SERVICE ROUTES
# ==========================================
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://auth-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/auth/**

# Swagger docs route
spring.cloud.gateway.routes[1].id=auth-swagger
spring.cloud.gateway.routes[1].uri=lb://auth-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/auth-service/v3/api-docs
spring.cloud.gateway.routes[1].filters[0]=RewritePath=/auth-service/(?<segment>.*), /$\\{segment}

# ==========================================
# ORDER SERVICE ROUTES
# ==========================================
spring.cloud.gateway.routes[2].id=order-service
spring.cloud.gateway.routes[2].uri=lb://order-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/orders/**,/products/**
spring.cloud.gateway.routes[2].filters[0]=AuthenticationFilter

# Swagger docs route
spring.cloud.gateway.routes[3].id=order-swagger
spring.cloud.gateway.routes[3].uri=lb://order-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/order-service/v3/api-docs
spring.cloud.gateway.routes[3].filters[0]=RewritePath=/order-service/(?<segment>.*), /$\\{segment}

# ==========================================
# PAYMENT SERVICE ROUTES
# ==========================================
spring.cloud.gateway.routes[4].id=payment-service
spring.cloud.gateway.routes[4].uri=lb://payment-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/payments/**
spring.cloud.gateway.routes[4].filters[0]=AuthenticationFilter

# Swagger docs route
spring.cloud.gateway.routes[5].id=payment-swagger
spring.cloud.gateway.routes[5].uri=lb://payment-service
spring.cloud.gateway.routes[5].predicates[0]=Path=/payment-service/v3/api-docs
spring.cloud.gateway.routes[5].filters[0]=RewritePath=/payment-service/(?<segment>.*), /$\\{segment}

# ==========================================
# SHIPMENT SERVICE ROUTES
# ==========================================
spring.cloud.gateway.routes[6].id=shipment-service
spring.cloud.gateway.routes[6].uri=lb://shipment-service
spring.cloud.gateway.routes[6].predicates[0]=Path=/shipments/**
spring.cloud.gateway.routes[6].filters[0]=AuthenticationFilter

# Swagger docs route
spring.cloud.gateway.routes[7].id=shipment-swagger
spring.cloud.gateway.routes[7].uri=lb://shipment-service
spring.cloud.gateway.routes[7].predicates[0]=Path=/shipment-service/v3/api-docs
spring.cloud.gateway.routes[7].filters[0]=RewritePath=/shipment-service/(?<segment>.*), /$\\{segment}

# ==========================================
# REPORT SERVICE ROUTES
# ==========================================
spring.cloud.gateway.routes[8].id=report-service
spring.cloud.gateway.routes[8].uri=lb://report-service
spring.cloud.gateway.routes[8].predicates[0]=Path=/reports/**
spring.cloud.gateway.routes[8].filters[0]=AuthenticationFilter

# Swagger docs route
spring.cloud.gateway.routes[9].id=report-swagger
spring.cloud.gateway.routes[9].uri=lb://report-service
spring.cloud.gateway.routes[9].predicates[0]=Path=/report-service/v3/api-docs
spring.cloud.gateway.routes[9].filters[0]=RewritePath=/report-service/(?<segment>.*), /$\\{segment}

# ==========================================
# SPRINGDOC SWAGGER CONFIGURATION
# ==========================================
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.disable-swagger-default-url=true

springdoc.swagger-ui.urls[0].name=Auth Service
springdoc.swagger-ui.urls[0].url=/auth-service/v3/api-docs

springdoc.swagger-ui.urls[1].name=Order Service
springdoc.swagger-ui.urls[1].url=/order-service/v3/api-docs

springdoc.swagger-ui.urls[2].name=Payment Service
springdoc.swagger-ui.urls[2].url=/payment-service/v3/api-docs

springdoc.swagger-ui.urls[3].name=Shipment Service
springdoc.swagger-ui.urls[3].url=/shipment-service/v3/api-docs

springdoc.swagger-ui.urls[4].name=Report Service
springdoc.swagger-ui.urls[4].url=/report-service/v3/api-docs

# ==========================================
# LOGGING
# ==========================================
logging.level.root=INFO
logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.org.springframework.http.server.reactive=DEBUG
logging.level.org.springframework.web.reactive=DEBUG
logging.level.reactor.netty.http.server=DEBUG
